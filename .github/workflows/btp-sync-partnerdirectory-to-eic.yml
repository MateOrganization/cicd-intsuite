# 1.0.0 - 2026-02-27 - Initial release for Edge Integration Cell support
# 1.1.0 - 2026-05-05 - Add BTP_EIC_URL_TEMPLATE variable; EIC URL path not yet published — subject to change
# 1.2.0 - 2026-05-12 - Add GitHub App authentication support (O.Weng)
# 1.3.0 - 2026-05-18 - Require GitHub App authentication; remove PAT fallback (O.Weng)
# 1.4.0 - 2026-05-21 - Split single GitHub App into CICD reader (GIT_CICD_APP_ID) and consumer bot (GIT_GITHUB_APP_ID); remove GIT_GITHUB_APP_PRIVATE_KEY from sync-eic secrets passthrough (reference workflow doesn't declare it) (O.Weng)
# 1.5.0 - 2026-05-21 - Merge authorize and read-env-vars into single initialize job (O.Weng)
# 1.6.0 - 2026-05-28 - Replace hardcoded target-env options with #!cicd:target-env-options! placeholder (O.Weng)
#
# This workflow syncs Partner Directory entries from the DEV Cloud Integration
# to configured Edge Integration Cell (EIC) runtimes. This is useful when you
# want to keep EIC runtimes in sync with Cloud Integration without storing
# Partner Directory data in Git.
#
# Prerequisites:
# - Configure BTP_EIC_RUNTIMES variable in your GitHub environment (e.g., "eicruntime01,deveiceur")
# - Ensure the Partner Directory entries already exist in the source Cloud Integration
#

name: (Admin) Sync Partner Directory to Edge Integration Cells

on:
  workflow_dispatch:
    inputs:
      partner-ids:
        description: "Comma-separated list of Partner IDs to sync to EIC"
        required: true
        type: string
      target-env:
        description: "Source Environment (Cloud Integration to sync FROM)"
        required: true
        type: choice
        options:
          - ""
          - "DEV"
          - "TST"

permissions:
  contents: read

jobs:
  initialize:
    name: Authorize & Read Environment Variables for ${{ github.event.inputs.target-env }}
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.target-env }}
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ steps.export.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ steps.export.outputs.btp-eic-url-template }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Validate GitHub App configuration
        shell: bash
        env:
          APP_ID: ${{ vars.GIT_GITHUB_APP_ID }}
        run: |
          [ -z "$APP_ID" ] && echo "🛑 GIT_GITHUB_APP_ID is not set. This workflow requires GitHub App authentication." && exit 1
          echo "✅ GitHub App ID configured"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GIT_GITHUB_APP_PRIVATE_KEY }}

      - name: Check team authorization
        uses: MateOrganization/cicd-actions-for-sap-integration-suite/.github/actions/check-team-authorization@main
        with:
          team-slug: ${{ vars.BTP_ADMIN_TEAM_SLUG }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "btp-eic-runtimes=${{ vars.BTP_EIC_RUNTIMES }}" >> $GITHUB_OUTPUT
          echo "btp-eic-url-template=${{ vars.BTP_EIC_URL_TEMPLATE }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

      - name: Validate EIC Runtimes
        run: |
          if [ -z "${{ vars.BTP_EIC_RUNTIMES }}" ]; then
            echo "❌ Error: BTP_EIC_RUNTIMES variable is not configured for environment ${{ github.event.inputs.target-env }}"
            echo "Please configure BTP_EIC_RUNTIMES with comma-separated EIC runtime identifiers (e.g., 'eicruntime01,deveiceur')"
            exit 1
          fi
          if [ -z "${{ vars.BTP_EIC_URL_TEMPLATE }}" ]; then
            echo "❌ Error: BTP_EIC_URL_TEMPLATE variable is not configured for environment ${{ github.event.inputs.target-env }}"
            echo "Note: EIC URL path is not yet published — pre-work to support EIC, subject to change."
            exit 1
          fi
          echo "✅ EIC Runtimes configured: ${{ vars.BTP_EIC_RUNTIMES }}"

  sync-pd-to-eic:
    needs: [initialize]
    name: Sync Partner Directory to EIC
    uses: MateOrganization/cicd-actions-for-sap-integration-suite/.github/workflows/sync-partnerdirectory-to-eic.yml@main
    with:
      workflow-ref: main
      target-env: ${{ github.event.inputs.target-env }}
      partnerdirectory-ids: ${{ github.event.inputs.partner-ids }}
      btp-api-user: ${{ needs.initialize.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize.outputs.btp-api-url }}
      btp-eic-runtimes: ${{ needs.initialize.outputs.btp-eic-runtimes }}
      btp-eic-url-template: ${{ needs.initialize.outputs.btp-eic-url-template }}
      git-cicd-orgrepo: ${{ needs.initialize.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
