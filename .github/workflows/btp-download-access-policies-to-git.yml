name: (Admin) BTP Download Access Policies into GIT download Branch
on:
  workflow_dispatch:
    inputs:
      names:
        description: "Comma-separated list of Access Policy names to download."
        required: true
        type: string
      source-env:
        description: "Environment - Source BTP for Download"
        required: true
        type: choice
        options:
          - ""
          - "DEV"
          - "TST"
      commit-message:
        description: "JIRA Story / SNOW Incident"
        required: true
        type: string
permissions:
  contents: write

jobs:
  initialize:
    name: Authorize & Read Environment Variables for ${{ inputs.source-env }}
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: ${{ inputs.source-env }}
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Validate GitHub App configuration
        shell: bash
        env:
          APP_ID: ${{ vars.GIT_GITHUB_APP_ID }}
          CICD_APP_ID: ${{ vars.GIT_CICD_APP_ID }}
        run: |
          [ -z "$APP_ID" ] && echo "🛑 GIT_GITHUB_APP_ID is not set. This workflow requires GitHub App authentication." && exit 1
          echo "✅ GitHub App ID configured"
          [ -z "$CICD_APP_ID" ] && echo "🛑 GIT_CICD_APP_ID is not set. Required for cross-org access to the CICD repository." && exit 1
          echo "✅ CICD App ID configured"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GIT_GITHUB_APP_PRIVATE_KEY }}

      - name: Check team authorization
        uses: MateOrganization/cicd-actions-for-sap-integration-suite/.github/actions/check-team-authorization@main
        with:
          team-slug: ${{ vars.BTP_ADMIN_TEAM_SLUG }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

  btp-download-access-policies-to-git:
    needs: [initialize]
    name: Download from BTP to GIT
    uses: MateOrganization/cicd-actions-for-sap-integration-suite/.github/workflows/btp-download-access-policies-to-git.yml@main
    with:
      workflow-ref: main
      source-env: ${{ inputs.source-env }}
      target-ref: download
      names: ${{ inputs.names }}
      commit-message: ${{ inputs.commit-message }}
      btp-api-user: ${{ needs.initialize.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.initialize.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
