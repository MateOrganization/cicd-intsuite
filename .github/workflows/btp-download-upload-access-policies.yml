name: (Admin) BTP Download Access Policies to GIT and Upload to TST

on:
  workflow_dispatch:
    inputs:
      names:
        description: "Comma-separated list of Access Policy names"
        required: true
        type: string
      commit-message:
        description: "JIRA Story / SNOW Incident"
        required: true
        type: string

permissions:
  contents: write

jobs:
  initialize-dev:
    name: Authorize & Read Environment Variables for DEV
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: DEV
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Validate GitHub App configuration
        shell: bash
        env:
          APP_ID: ${{ vars.GIT_GITHUB_APP_ID }}
          CICD_APP_ID: ${{ vars.GIT_CICD_APP_ID }}
        run: |
          [ -z "$APP_ID" ] && echo "🛑 GIT_GITHUB_APP_ID is not set. This workflow requires GitHub App authentication." && exit 1
          echo "✅ GitHub App ID configured"
          [ -z "$CICD_APP_ID" ] && echo "🛑 GIT_CICD_APP_ID is not set. Required for cross-org access to the CICD repository." && exit 1
          echo "✅ CICD App ID configured"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.GIT_GITHUB_APP_ID }}
          private-key: ${{ secrets.GIT_GITHUB_APP_PRIVATE_KEY }}

      - name: Check team authorization
        uses: MateOrganization/cicd-actions-for-sap-integration-suite/.github/actions/check-team-authorization@main
        with:
          team-slug: ${{ vars.BTP_ADMIN_TEAM_SLUG }}
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

  btp-download-access-policies:
    needs: initialize-dev
    name: Download Access Policies from DEV
    uses: MateOrganization/cicd-actions-for-sap-integration-suite/.github/workflows/btp-download-access-policies-to-git.yml@main
    with:
      workflow-ref: main
      source-env: DEV
      target-ref: development
      names: ${{ inputs.names }}
      commit-message: ${{ inputs.commit-message }}
      btp-api-user: ${{ needs.initialize-dev.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.initialize-dev.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.initialize-dev.outputs.btp-token-url }}
      btp-api-url: ${{ needs.initialize-dev.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.initialize-dev.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}

  read-env-vars-tst:
    needs: [btp-download-access-policies]
    name: Read Environment Variables for Test
    runs-on: ${{ vars.RUNS_ON && fromJson(vars.RUNS_ON) || 'ubuntu-latest' }}
    environment: TST
    outputs:
      btp-api-user: ${{ steps.export.outputs.btp-api-user }}
      btp-tec-user: ${{ steps.export.outputs.btp-tec-user }}
      btp-token-url: ${{ steps.export.outputs.btp-token-url }}
      btp-api-url: ${{ steps.export.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ steps.export.outputs.git-cicd-orgrepo }}
    steps:
      - name: Export vars
        id: export
        run: |
          echo "btp-api-user=${{ vars.BTP_API_USER }}" >> $GITHUB_OUTPUT
          echo "btp-tec-user=${{ vars.BTP_TEC_USER }}" >> $GITHUB_OUTPUT
          echo "btp-token-url=${{ vars.BTP_TOKEN_URL }}" >> $GITHUB_OUTPUT
          echo "btp-api-url=${{ vars.BTP_API_URL }}" >> $GITHUB_OUTPUT
          echo "git-cicd-orgrepo=${{ vars.GIT_CICD_ORGREPO }}" >> $GITHUB_OUTPUT

  btp-upload-access-policies:
    needs: [read-env-vars-tst]
    name: Upload Access Policies to TST
    uses: MateOrganization/cicd-actions-for-sap-integration-suite/.github/workflows/delete-upload-access-policies.yml@main
    with:
      workflow-ref: main
      target-env: TST
      source-ref: development
      accesspolicies-upload-names: ${{ inputs.names }}
      btp-api-user: ${{ needs.read-env-vars-tst.outputs.btp-api-user }}
      btp-tec-user: ${{ needs.read-env-vars-tst.outputs.btp-tec-user }}
      btp-token-url: ${{ needs.read-env-vars-tst.outputs.btp-token-url }}
      btp-api-url: ${{ needs.read-env-vars-tst.outputs.btp-api-url }}
      git-cicd-orgrepo: ${{ needs.read-env-vars-tst.outputs.git-cicd-orgrepo }}
    secrets:
      BTP_TEC_PASSWORD: ${{ secrets.BTP_TEC_PASSWORD }}
      BTP_API_PASSWORD: ${{ secrets.BTP_API_PASSWORD }}
      GIT_CICD_APP_PRIVATE_KEY: ${{ secrets.GIT_CICD_APP_PRIVATE_KEY }}
